services:
  infrawatch-api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: infrawatch-api
    env_file:
      - .env.example
    environment:
      - PORT=${APP_PORT:-8080}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: infrawatch-nginx
    ports:
      - "8082:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - infrawatch-api
    restart: unless-stopped
